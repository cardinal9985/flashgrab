version: 2

project_name: flashgrab

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./cmd/flashgrab
    binary: flashgrab
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

nfpms:
  - package_name: flashgrab
    homepage: https://github.com/cardinal9985/flashgrab
    maintainer: cardinal9985
    description: Grab Flash and browser games from the web
    license: MIT
    formats:
      - deb
      - rpm
